<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renaissance Senger</title>

<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Jost', sans-serif;
  background: #111;
  color: #fff;
}

/* OVERLAY */
#startOverlay {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  cursor: pointer;
}

#startOverlay div {
  text-align: center;
}

#startOverlay p {
  margin: 5px 0;
  letter-spacing: 3px;
}

/* BOTÃO SOM */
#soundBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  border: none;
  color: #fff;
  padding: 10px;
  font-size: 16px;
  cursor: pointer;
  z-index: 9999;
  display: none;
}

/* CONTEÚDO SIMPLES (SEU SITE) */
#site {
  padding: 40px;
}

h1 {
  font-size: 40px;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="startOverlay">
  <div>
    <p>RENAISSANCE</p>
    <p>Clique para iniciar a apresentação</p>
  </div>
</div>

<!-- SITE -->
<div id="site">
  <h1>Renaissance Senger</h1>
  <p>Seu site está ativo.</p>
  <p>A navegação continua normal com a música tocando.</p>

  <div style="height:2000px;"></div>
</div>

<!-- ÁUDIO -->
<audio id="bgMusic" preload="auto">
  <source src="who-made-who.mp3.mp3" type="audio/mpeg">
</audio>

<button id="soundBtn">🔊</button>

<script>
const overlay = document.getElementById('startOverlay');
const music = document.getElementById('bgMusic');
const soundBtn = document.getElementById('soundBtn');

overlay.addEventListener('click', () => {
  overlay.style.display = 'none';
  music.volume = 0.6;
  music.play();
  soundBtn.style.display = 'block';
});

soundBtn.addEventListener('click', () => {
  if (music.muted) {
    music.muted = false;
    soundBtn.innerText = '🔊';
  } else {
    music.muted = true;
    soundBtn.innerText = '🔇';
  }
});
</script>

</body>
</html>
